<p
  [ngClass]="{
    active: isActive(),
    disabled: isDisabel(),
    error: hasError(),
    online: statues() === 'online',
    offline: statues() === 'offline',
    away: statues() === 'away',
    permium: isPremium(),
  }"
  [class.active]="isActive()"
  [class.disabled]="isDisabel()"
  [class.error]="hasError()"
  [ngStyle]="{
    'background-color': bg(),
  }"
  [style.background-color]="bg()"
  class="appHighlight"
>
  status
</p>

<p appHighlight>Custom</p>
<p appHighlight [bg]="'green'">default color</p>
<p appHighlight [color]="'BLACK'" [bg]="'green'">diff color</p>
